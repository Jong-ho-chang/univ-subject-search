<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2028학년도 대학별 권장과목 검색기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;font-size:14px;background:#f7f8fa;color:#1a1a1a;min-height:100vh}
.header{background:#1f3b6e;color:#fff;padding:18px 24px}
.header h1{font-size:18px;font-weight:600;margin-bottom:4px}
.header p{font-size:12px;opacity:.75}
.sticky-top{position:sticky;top:0;z-index:10;background:#fff}
.search-area{background:#fff;border-bottom:1px solid #e0e4eb;padding:14px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.search-area input[type=text]{flex:1;min-width:180px;padding:8px 12px;border:1px solid #c8cdd6;border-radius:6px;font-size:13px;outline:none}
.search-area input[type=text]:focus{border-color:#1f3b6e}
.search-area select{padding:8px 10px;border:1px solid #c8cdd6;border-radius:6px;font-size:13px;background:#fff;color:#1a1a1a;outline:none;cursor:pointer}
.search-area select:focus{border-color:#1f3b6e}
.search-area button{padding:8px 16px;background:#1f3b6e;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;white-space:nowrap}
.search-area button:hover{background:#16305a}
.count-bar{padding:8px 24px;font-size:12px;color:#666;background:#f7f8fa;border-bottom:1px solid #e0e4eb}
.count-bar span{font-weight:600;color:#1f3b6e}
table{width:100%;border-collapse:collapse;background:#fff}
thead th{background:#1f3b6e;color:#fff;padding:10px 12px;font-size:12px;font-weight:600;text-align:left;position:sticky;top:0;z-index:5;white-space:nowrap}
tbody tr:nth-child(even){background:#f9fafb}
tbody tr:hover{background:#eef2ff}
td{padding:9px 12px;font-size:12px;border-bottom:1px solid #eef0f4;vertical-align:top;line-height:1.5}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:11px;margin:1px 2px}
.tag-region{background:#dbe8fb;color:#1a4a8a}
.tag-city{background:#e2f5ec;color:#0e5c36}
.no-data{color:#999;font-style:italic}
.highlight{background:#fff59d;border-radius:2px}
.univ-name{font-weight:600;color:#1f3b6e}
.dept-cell{max-width:180px}
.subj-cell{max-width:220px;word-break:break-all}
.note-cell{max-width:160px;color:#666;font-size:11px}
.modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:100;overflow-y:auto}
.modal-bg.open{display:flex;align-items:flex-start;justify-content:center;padding:40px 16px}
.modal{background:#fff;border-radius:10px;width:100%;max-width:640px;padding:24px;position:relative}
.modal h3{font-size:16px;margin-bottom:16px;color:#1f3b6e}
.modal-close{position:absolute;top:14px;right:16px;font-size:18px;background:none;border:none;cursor:pointer;color:#666}
.modal-row{display:flex;gap:8px;margin-bottom:10px;align-items:flex-start}
.modal-label{font-size:12px;color:#888;min-width:60px;flex-shrink:0;padding-top:2px}
.modal-val{font-size:13px;line-height:1.6}
.modal-val.core{color:#c0392b;font-weight:600}
.modal-val.rec{color:#1a6b3c}
.footer-info{padding:8px 24px;font-size:11px;color:#999;background:#f7f8fa;border-top:1px solid #e0e4eb}
@media(max-width:600px){
thead th:nth-child(5),thead th:nth-child(6),thead th:nth-child(7){display:none}
td:nth-child(5),td:nth-child(6),td:nth-child(7){display:none}
}
</style>
</head>
<body>
<div class="header">
  <h1>📚 2028학년도 대학별 권장과목 검색기</h1>
  <p>권역별 47개 대학, 1,358개 모집단위의 핵심과목·권장과목 정보</p>
</div>

<div class="sticky-top" id="sticky-top">
<div class="search-area">

  <select id="sel-region" onchange="updateCities();render()">
    <option value="">전체 권역</option>
    <option>수도권</option>
    <option>영남권</option>
    <option>중부권</option>
    <option>호남권</option>
  </select>
  <select id="sel-city" onchange="render()">
    <option value="">전체 지역</option>
  </select>
  <select id="sel-univ" onchange="render()">
    <option value="">전체 대학</option>
  </select>
  <button onclick="clearAll()">초기화</button>
</div>
<div class="count-bar" id="count-bar">전체 <span id="cnt">-</span>개 모집단위</div>
</div>

<div style="overflow-x:auto">
<table id="tbl">
<thead>
<tr>
  <th style="width:50px">권역</th>
  <th style="width:40px">지역</th>
  <th style="width:90px">대학명</th>
  <th style="width:130px">모집단위</th>
  <th style="width:200px">핵심과목</th>
  <th style="width:160px">권장과목</th>
  <th style="width:50px">상세</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="footer-info">※ 출처: 2028학년도 권역별 대학별 권장과목(반영과목) 자료 | 정확한 사항은 각 대학 입학처에서 반드시 확인하시기 바랍니다.</div>

<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
<div class="modal">
  <button class="modal-close" onclick="closeModal()">✕</button>
  <h3 id="m-title">상세 정보</h3>
  <div class="modal-row"><span class="modal-label">권역/지역</span><span class="modal-val" id="m-rl"></span></div>
  <div class="modal-row"><span class="modal-label">대학명</span><span class="modal-val" id="m-univ"></span></div>
  <div class="modal-row"><span class="modal-label">모집단위</span><span class="modal-val" id="m-dept"></span></div>
  <div class="modal-row"><span class="modal-label">핵심과목</span><span class="modal-val core" id="m-core"></span></div>
  <div class="modal-row"><span class="modal-label">권장과목</span><span class="modal-val rec" id="m-rec"></span></div>
  <div class="modal-row"><span class="modal-label">비고</span><span class="modal-val" id="m-note"></span></div>
</div>
</div>

const CITIES={
  '수도권':['서울','인천','경기'],
  '영남권':['부산','대구','경북','경남'],
  '중부권':['대전','강원','충북','충남'],
  '호남권':['광주','전북','전남']
};

let univList=[];
function populateUnivs(){
  const r=document.getElementById('sel-region').value;
  const c=document.getElementById('sel-city').value;
  let univs=[...new Set(RAW.filter(d=>{
    if(r&&d.r!==r)return false;
    if(c&&d.l!==c)return false;
    return true;
  }).map(d=>d.u))].sort();
  const sel=document.getElementById('sel-univ');
  const cur=sel.value;
  sel.innerHTML='<option value="">전체 대학</option>'+univs.map(u=>`<option value="${esc(u)}">${esc(u)}</option>`).join('');
  if(univs.includes(cur))sel.value=cur;
}
function updateCities(){
  const r=document.getElementById('sel-region').value;
  const cs=r?CITIES[r]:[];
  const sel=document.getElementById('sel-city');
  sel.innerHTML='<option value="">전체 지역</option>'+(cs||[]).map(c=>`<option>${c}</option>`).join('');
  populateUnivs();
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hi(s,q){
  if(!q)return esc(s);
  const reg=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return esc(s).replace(reg,'<mark class="highlight">$1</mark>');
}
function truncate(s,n=40){return s&&s.length>n?s.slice(0,n)+'…':s}

function render(){
  populateUnivs();
  const kw=document.getElementById('kw').value.trim();
  const region=document.getElementById('sel-region').value;
  const city=document.getElementById('sel-city').value;
  const univ=document.getElementById('sel-univ').value;
  let data=RAW.filter(d=>{
    if(region&&d.r!==region)return false;
    if(city&&d.l!==city)return false;
    if(univ&&d.u!==univ)return false;
    if(kw){
      const q=kw.toLowerCase();
      return(d.u+d.c+d.d+d.k+d.rec+d.n).toLowerCase().includes(q);
    }
    return true;
  });
  document.getElementById('cnt').textContent=data.length.toLocaleString();
  const rows=data.slice(0,500).map((d,i)=>{
    const dept=d.d?d.c+' / '+d.d:d.c;
    const kid=d.k&&d.k!=='-'&&d.k?d.k:'—';
    const rid=d.rec&&d.rec!=='-'&&d.rec?d.rec:'—';
    const idx=RAW.indexOf(d);
    return`<tr>
<td><span class="tag tag-region">${esc(d.r)}</span></td>
<td><span class="tag tag-city">${esc(d.l)}</span></td>
<td class="univ-name">${hi(d.u,kw)}</td>
<td class="dept-cell">${hi(truncate(dept,35),kw)}</td>
<td class="subj-cell">${hi(truncate(kid,60),kw)}</td>
<td class="subj-cell">${hi(truncate(rid,50),kw)}</td>
<td><button onclick="showModal(${idx})" style="padding:3px 8px;font-size:11px;border:1px solid #c0c8d8;border-radius:4px;cursor:pointer;background:#fff">상세</button></td>
</tr>`;
  }).join('');
  document.getElementById('tbody').innerHTML=rows||(data.length===0?'<tr><td colspan="7" style="text-align:center;padding:24px;color:#999">검색 결과가 없습니다.</td></tr>':'');
  document.getElementById('count-bar').innerHTML=`전체 <span id="cnt">${data.length.toLocaleString()}</span>개 모집단위${data.length>500?' (최대 500개 표시)':''}`;
}

function showModal(i){
  const d=RAW[i];
  const dept=d.d?d.c+'\n'+d.d:d.c;
  document.getElementById('m-title').textContent=d.u+' — '+(d.d||d.c);
  document.getElementById('m-rl').textContent=d.r+' / '+d.l;
  document.getElementById('m-univ').textContent=d.u;
  document.getElementById('m-dept').textContent=dept;
  document.getElementById('m-core').textContent=(d.k&&d.k!=='-')?d.k:'(없음)';
  document.getElementById('m-rec').textContent=(d.rec&&d.rec!=='-')?d.rec:'(없음)';
  document.getElementById('m-note').textContent=(d.n&&d.n!=='-')?d.n:'—';
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
function clearAll(){
  document.getElementById('kw').value='';
  document.getElementById('sel-region').value='';
  document.getElementById('sel-city').innerHTML='<option value="">전체 지역</option>';
  document.getElementById('sel-univ').value='';
  render();
}

populateUnivs();
render();
